<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <title>Admin Manga Tool</title>

    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/file-saver@2.0.5/dist/FileSaver.min.js"></script>

    <style>
      body {
        font-family: "Segoe UI", sans-serif;
        background: #0f172a;
        color: #fff;
        padding: 20px;
      }

      .container {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 20px;
      }

      .card {
        background: #020617;
        padding: 16px;
        border-radius: 12px;
      }

      input,
      select {
        width: 100%;
        padding: 8px;
        margin: 6px 0 12px;
        border-radius: 6px;
        border: none;
      }

      button {
        padding: 10px;
        border-radius: 8px;
        border: none;
        background: #3b82f6;
        color: white;
        cursor: pointer;
        width: 100%;
        margin-top: 6px;
      }

      .preview {
        display: grid;
        grid-template-columns: repeat(auto-fill, 60px);
        gap: 6px;
      }

      .preview img {
        width: 100%;
        border-radius: 6px;
        cursor: grab;
      }

      .dropzone {
        border: 2px dashed #334155;
        padding: 20px;
        text-align: center;
        border-radius: 10px;
        margin-bottom: 12px;
      }
    </style>
  </head>

  <body>
    <h1>🛠️ Admin Manga Tool PRO</h1>

    <div class="container">
      <!-- LEFT -->
      <div class="card">
        <h3>📂 Upload</h3>

        <div id="dropzone" class="dropzone">Drag gambar di sini</div>

        <input type="file" id="fileInput" multiple />

        <h3>Preview (drag untuk urut)</h3>
        <div id="preview" class="preview"></div>
      </div>

      <!-- RIGHT -->
      <div class="card">
        <h3>⚙️ Setting</h3>
        <input id="zipName" placeholder="Nama ZIP (contoh: goldship_ch1)" />
        <select id="format">
          <option value="image/jpeg">JPG</option>
          <option value="image/png">PNG</option>
          <option value="image/webp">WEBP</option>
        </select>

        <input
          id="quality"
          type="number"
          placeholder="Quality (1-100)"
          value="80"
        />
        <input id="width" type="number" placeholder="Resize width (optional)" />

        <button onclick="downloadZip()">📦 Convert & Download</button>

        <h3>📝 Data</h3>
        <input id="title" placeholder="Judul" />
        <input id="artist" placeholder="Artist name" />
        <input id="artistUrl" placeholder="Artist URL" />
        <input id="description" placeholder="Deskripsi" />
        <input id="status" placeholder="Status (Tamat/Ongoing)" />
        <input id="tags" placeholder="Tags (pisah koma)" />
        <input id="id" placeholder="ID (auto)" />
        <input id="series" placeholder="Series" />
        <input id="genres" placeholder="Genre (pisah koma)" />
        <input id="folder" placeholder="image/nama-manga/ch1/" />

        <button onclick="generate()">Generate JSON</button>
        <button onclick="copyJSON()">Copy JSON</button>

        <pre id="output"></pre>
      </div>
    </div>

    <script src="js/admin.js"></script>
  </body>
</html>
