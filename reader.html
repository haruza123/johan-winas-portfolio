<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Baca manga — Johan Winas TL" />
    <title>Reader — Johan Winas TL</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/style.css" />
    <script src="js/analytics.js"></script>
  </head>
  <body class="reader-page mode-scroll" data-theme="dark" data-oc="ryou">
    <a class="skip-link" class="nav-link" href="#reader-main"
      >Langsung ke konten</a
    >

    <div class="brand-oc" aria-hidden="true">
      <img
        class="brand-oc__img brand-oc__img--left"
        src="image/Himori_Rinka.png"
        alt=""
      />
      <img
        class="brand-oc__img brand-oc__img--right"
        src="image/Ryou_Akatsune.png"
        alt=""
      />
    </div>

    <header class="site-header">
      <nav class="navbar" aria-label="Utama">
        <a class="navbar__brand" class="nav-link" href="index.html"
          >Johan Winas TL</a
        >
        <div class="navbar__search-wrap">
          <label class="visually-hidden" for="manga-search"
            >Cari judul manga</label
          >
          <input
            id="manga-search"
            class="navbar__search"
            type="search"
            placeholder="Cari judul…"
            autocomplete="off"
            spellcheck="false"
          />
        </div>
        <button
          class="theme-toggle"
          id="theme-toggle"
          type="button"
          aria-label="Ubah tema"
        >
          &#127769;
        </button>
      </nav>
    </header>

    <main id="reader-main">
      <div class="reader-shell">
        <div class="reader-head">

          <a
            class="detail-back"
            class="nav-link"
            href="index.html"
            id="reader-back"
            >← Kembali</a
          >
          <h1 class="reader-title" id="reader-title">Reader</h1>
          
          <p class="reader-hint" id="reader-hint"></p>
        </div>
          <div class="reader-controls" aria-label="Kontrol reader">

            <div class="reader-progress-bar">
            <div id="reader-progress-fill"></div>
          </div>
            <div class="reader-controls__group">
              <a class="btn btn--ghost" id="action-back" href="#">
                ← Kembali
              </a>
              <button class="btn btn--ghost" id="mode-toggle">
                Mode: Scroll
              </button>
              <button class="btn btn--ghost" type="button" id="reader-settings-open">
                Settings
              </button>
              <button class="btn btn--primary" type="button" id="next-chapter" style="display: none;">
                Next Chapter →
              </button>
              <p class="reader-progress" id="reader-progress">Page 1 / 20</p>
            </div>
            <div class="reader-controls__group">
              <label class="visually-hidden" for="chapter-select"
                >Pilih chapter</label
              >
              <select
                class="reader-controls__select"
                id="chapter-select"
              ></select>
            </div>
          </div>
        <div
          class="reader-pages"
          id="reader-pages"
          aria-label="Halaman manga"
        ></div>

        <div id="reader-end" aria-hidden="true"></div>

        <section
          class="reader-reco"
          id="reader-reco"
          aria-labelledby="reader-reco-title"
          hidden
        >
          <div class="reader-reco__head">
            <h2 class="reader-reco__title" id="reader-reco-title">
              Rekomendasi lainnya
            </h2>
            <p class="reader-reco__meta" id="reader-reco-meta"></p>
          </div>
          <div class="reader-reco__grid" id="reader-reco-grid"></div>
        </section>
      </div>
    </main>

    <footer class="site-footer">
      <p class="site-footer__copy">
        © <span id="year"></span> Rizqi W — Portfolio penerjemah.
      </p>
    </footer>

    <script src="js/theme.js"></script>
    <script src="js/security.js"></script>
    <script src="js/reader.js"></script>
  </body>
</html>
